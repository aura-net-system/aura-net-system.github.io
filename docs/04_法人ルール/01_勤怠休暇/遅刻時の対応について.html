<script id="md-src" type="text/x-markdown"># 遅刻時の対応について

&gt; **ver.1.1 ／ 2025年7月15日　医療法人いなだ医院**

---

## 基本的な考え方

遅刻は、組織人・社会人として原則として許されるべきものではなく、**懲戒や減俸評価の対象となり得る重大な勤務違反**です。やむを得ない事情を除き、正当な理由のない遅刻は業務に支障を及ぼすため、原則として評価査定への反映および減俸等の対応を行います。

---

## 公共的な理由による遅刻（原則：免責）

以下の不可抗力による遅刻については、原則として勤務扱いとし、懲戒・減俸の対象としません。

| 理由 | 必要書類 |
|------|---------|
| 公共交通機関の遅延 | 遅延証明書 |
| 地震・台風・大雪等の自然災害 | 原則不要 |
| 大規模事故・インフラ障害 | 原則不要 |
| 同居家族（子ども・被介護者等）の急な体調不良による受診付き添い | 診療明細書・受診票、または申立書 |
| その他、法人がやむを得ないと判断した社会的要因 | 証明書類（必要に応じて） |

&gt; **注意：** 書類が提出された場合でも、内容により法人がやむを得ない事情と認めない場合は、有給使用の対象外となります。

---

## 個人的な理由による遅刻（原則：懲戒対象）

以下のような理由による遅刻は自己都合と見なし、原則として**勤怠評価への影響および減俸処理**を行います。

**主な該当例：**
- 寝坊、目覚ましミス、支度の遅れ
- 子どもの送迎や家庭内トラブル
- 私的な通院や服薬忘れ、軽微な体調不良
- 銀行・役所・買い物等の私事
- スマホの充電切れ、通知設定ミス

**通勤車両関連で多い遅刻例：**
- 渋滞予測の甘さ（朝の混雑回避が不十分）
- 悪天候時に備えた出発準備不足
- 燃料補給忘れ・エンジントラブルの未整備
- 予測されていた天候悪化への対応遅れ

&gt; **補足：** 自然災害レベルの影響（道路封鎖、インフラ被害等）は「公共的理由」に該当することがありますが、事前に予測可能な天候・交通状況への準備不足は個人的理由として扱います。

---

## 有給休暇による遅刻対応（例外的運用）

遅刻に対して有給を使用する場合は、あくまで例外的対応とし、**法人の承認を前提**とします。

- 利用は **1時間単位** とし、1時間未満の遅刻は切り上げ（例：35分 → 1時間消化）
- 有給残数が不足している場合は減俸対象
- 希望者は所定の様式により事前または当日申請を行うこと
- 法人が承認しない限り、有給扱いとはなりません
- 遅刻と同時に有給申請を行う場合には、**医師の診断書・通院証明書等の証明書を添付提出**してください

---

## 有給申請に伴う出勤放棄等への対応

遅刻に対して有給を申請しながら、その後に出勤しないケースは**有給制度の趣旨に反する重大な勤務態度違反**と判断します。

- 「有給を取るから出勤しなくてよい」という考え方は誤りです
- このような行為が確認された場合には、**懲戒処分の対象**とします
- 再発者に対しては、今後の有給による遅刻処理の承認を一切行いません

---

## 申告・記録の手続き

1. 遅刻が判明した時点で、速やかに上司または管理者に**口頭報告**してください
2. 管理者はその旨を統括もしくは代表に報告をしてください
3. 勤怠記録には、遅刻理由および処理希望区分（懲戒 ／ 有給希望）を明記してください
4. **虚偽・無断報告が確認された場合は、厳重な懲戒処分の対象**とします

---

## 補足

- 軽微な遅刻であっても、繰り返される場合は評価・処遇に反映されます
- 法人は、全職員に対して公平・一律な基準で対応いたします</script>
