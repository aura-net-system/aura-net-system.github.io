<script id="md-src" type="text/x-markdown"># メディケア空調運用規定

&gt; **ver1.0 ／ 2025年7月25日　メディケアビレッジかしわじま**

---

## 1. 冷暖房使用開始の基準（エリア別）

### ① 事務室・休憩室

| 期間 | 室内温度 | 湿度 | モード |
|------|---------|------|--------|
| 5月〜10月 | 29℃以上 | 65%以上 | 冷房 |
| 5月〜10月 | 29℃以上 | 65%未満 | 冷房 |
| 5月〜10月 | 28℃未満 | 65%以上 | 除湿 |
| 11月〜4月 | 20℃以下 | — | 暖房 |

### ② フロア（安静時）

| 期間 | 室内温度 | 湿度 | モード |
|------|---------|------|--------|
| 5月〜10月 | 28℃以上 | 65%以上 | 冷房 |
| 5月〜10月 | 28℃以上 | 65%未満 | 冷房 |
| 5月〜10月 | 28℃未満 | 65%以上 | 除湿 |
| 11月〜4月 | 20℃以下 | — | 暖房 |

### ③ フロア（運動時）

| 期間 | 室内温度 | 湿度 | モード |
|------|---------|------|--------|
| 5月〜10月 | 27℃以上 | 65%以上 | 冷房 |
| 5月〜10月 | 27℃以上 | 65%未満 | 冷房 |
| 5月〜10月 | 27℃未満 | 65%以上 | 除湿 |
| 11月〜4月 | 20℃以下 | — | 暖房 |

---

## 2. 設定温度の目安（エリア別）

| エリア | モード | 設定温度 |
|--------|--------|---------|
| ① 事務室・休憩室 | 冷房 / 除湿 / 自動 | **28℃** |
| ① 事務室・休憩室 | 暖房 / 自動 | **21℃** |
| ② フロア（安静時） | 冷房 / 除湿 / 自動 | **27℃** |
| ② フロア（安静時） | 暖房 / 自動 | **21℃** |
| ③ フロア（運動時・時間限定） | 冷房 / 除湿 / 自動 | **26℃** |
| ③ フロア（運動時・時間限定） | 暖房 / 自動 | **21℃** |

---

## 3. 運用ルール

- 各エリアに温度計を設置し、毎日 **6:00 / 11:00 / 17:00 / 21:00** に室温確認を実施
- 運動時以外は**原則27℃**へ設定
- 事務室・休憩室に人がいない場合は**電源OFF徹底**
- サーキュレーター/扇風機を併用する
- 窓やドアの開閉は**必要最小限**とし、空調効率を保持

&gt; **⚠️ 注意：** 悪質・継続的なルール違反は、賞与査定の減点・業務改善指導書の発行対象となる場合があります。</script>
