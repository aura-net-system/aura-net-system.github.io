<script id="md-src" type="text/x-markdown"># 接遇マニュアル【新入職員向けオリエンテーション版】

医療法人 いなだ医院（2026年2月1日改訂）

## ようこそ！まずはこれだけ覚えてください

この資料は、入職後すぐに実践できる接遇の基本をまとめたものです。初日から使える具体例を中心に解説します。

## 1. あなたの仕事の意味を知ろう

- **私たちが目指すこと：** 介護を通してご利用者様の生きがいや温もりのある生活を支え、安心して暮らせる地域を実現します。
- **「おもてなす」とは：** 心を込めた対応、温かい気持ちで接すること。これが現場で最も大切なことです。
- **あなたの立場：** 専門職として人生の大先輩に敬意を払い、法人の代表としての自覚を持って行動してください。

## 2. 接遇の5原則【初日から実践】

1. **挨拶：** 自分から先に、心と体を相手に向けて行います。
2. **身だしなみ：** 清潔な制服、短い爪（ネイル禁止）、業務中の装飾品（結婚指輪以外）は不可。
3. **表情・笑顔：** 穏やかで親しみやすい表情を基本とし、マスク越しでも目元で笑顔を伝えます。
4. **態度・立ち居振る舞い：** 壁への寄りかかり、腕組み、ポケットに手を入れる姿勢は厳禁です。
5. **言葉遣い：** 常に「です・ます調」を使い、全員を「〇〇さん」と呼びます。

## 3. 職員同士の接遇と「報告・相談」のルール

良好なチームケアのため、職員間でもプロとしての接遇を徹底します。

- **職員間マナー：** 挨拶を徹底し、「ありがとうございます」「お疲れ様です」を積極的に伝えます。
- **私事の禁止：** 利用者の前で、職員同士の個人的な雑談や大声で笑い合うことは慎んでください。
- **相互扶助：** 困っている職員がいれば声をかけ、チームで業務を支えます。

### 【重要】指導と報告の仕組み（指揮系統の遵守）

当法人では、円滑な組織運営のために以下のルールを定めています。

- **上司の定義：** 当マニュアルでいう「上司」とは、組織図上の職位（役職）がついている管理者・リーダーを指します。勤続年数が長い、あるいは年齢が上であるといった「先輩・ベテラン」とは区別してください。
- **報告の徹底：** 他の職員の不適切な接遇を見かけたり、利用者から苦情を受けたりした場合は、自分の判断で動かず、必ず職位上の上司へ報告してください。
- **指導のルート：** 接遇に関する具体的な指摘や指導は、原則として職位上の上司から対象職員へ行われます。
- **新人としての注意：** 先輩職員から個人的な感情に基づく注意や、組織のルールから外れた指示を受けた場合も、まずは職位上の上司（管理者）に相談してください。

## 4. 今日から使える言葉遣い【具体例】

| 場面 | 推奨表現 |
|------|----------|
| 食事 | 「〇〇さん、お食事のご用意ができました」 |
| トイレ | 「お手洗いにご案内しましょうか」 |
| 待機 | 「少々お待ちいただけますか」「5分ほどお待ちください」 |
| 返事 | 「はい、かしこまりました」「承知いたしました」 |

## 5. 絶対に使ってはいけない言葉

以下の表現は虐待に該当する可能性があるため、**絶対に使用しないでください。**

- **命令・否定：** 「早くして」「ダメ」「違う」
- **子供扱い：** 「いい子」「偉いね」「おばあちゃん」
- **尊厳の欠如：** 「どうせ忘れるから」「また言ってる」

## 6. 困ったときの対応

- **わからないとき：** 勝手に判断せず、「わからない」と正直に伝え、先輩や上司に確認してください。
- **クレームを受けたら：** 相手の話を最後まで聴き（傾聴）、心情への謝罪をした上で、すぐに管理者に報告してください。

## 7. 迷ったときの判断基準

&gt; 「自分が利用者だったら、この対応をされて嫌ではないか？」  
&gt; 「自分の大切な家族が、この態度で接されたらどう感じるか？」  
&gt; 少しでも「嫌だ」と感じるなら、その言動は不適切です。

---

**【相談・報告窓口】** 接遇に関する不安や、現場での困りごとは、いつでも**直属の管理者（職位上の上司）** または法人本部人事担当まで連絡してください。</script>
