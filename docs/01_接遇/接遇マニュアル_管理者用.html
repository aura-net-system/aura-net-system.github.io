<script id="md-src" type="text/x-markdown"># 接遇振り返り制度 管理者向け運用マニュアル【確定版】

## 1. 本制度の位置づけ

本制度は、医療・介護現場における接遇の基準を法人内で統一し、継続的に定着させることを目的とする。

本制度は：
- 処遇・給与・賞与を決定するための評価制度では**ない**
- 職員を序列化・点数化するものでは**ない**

あくまで「指導・振り返りを感情ではなく共通ルールに基づいて行うための運用ツール」として位置づける。

## 2. 管理者の役割と責任

管理者は、以下の役割を担う。

- 担当事業所職員の接遇行動を日常的に観察する
- 月あたり上限5名を対象に、事実に基づいた管理者評価を行う
- 原則として半年で全職員を1周（年2周）するよう計画的に実施する
  - ※ 指導や面談が必要と判断した職員については、必要に応じて追加で評価・面談を行ってもよい
- 評価結果を他職員や第三者に開示しない

## 3. フォーム運用の基本構造

### 3-1. フォームの基本方針

- フォームは1種類とする
- 自己評価・管理者評価を同一フォームで行う
- 評価者と被評価者を明確に区別する

### 3-2. 入力区分

- **自己評価**（評価者：本人 ／ 被評価者：本人）※ 全職員が毎月実施
- **管理者評価**（評価者：管理者 ／ 被評価者：職員）※ 月上限5名

## 4. 評価項目と評価尺度

### 4-1. 評価項目（5項目）

1. 言葉遣い・呼称
2. 表情・態度
3. 利用者前での配慮（私語・声量等）
4. 忙しい時・イレギュラー時の対応
5. 職員間接遇

### 4-2. 評価尺度（4段階）

| レベル | 内容 |
|--------|------|
| レベル1 | 未実施・不十分 |
| レベル2 | 一部実施（不安定） |
| レベル3 | 概ね実施（安定） |
| レベル4 | 模範的 |

## 5. 管理者評価時の原則

### 5-1. 推測・伝聞で評価しない

実際に見聞きしていない事象や、他者からの噂・印象は評価根拠にしない。

### 5-2. 人ではなく行動を見る

性格・人柄・感情は評価対象としない。行動・言動・態度を具体的に捉える。

## 6. 面談・フィードバックの基準

| 評価状況 | 対応 |
|----------|------|
| 管理者評価が「レベル1」 | **必須面談**（早急な改善が必要なため） |
| 自己評価 ＞ 管理者評価（差が2pt以上） | **推奨面談**（本人の認識と実態に大きな乖離があるため） |
| 上記以外（差が2pt未満など） | 管理者の判断に委ねる（日常の声かけで対応可） |

## 7. 管理者の月次運用ルール

具体的な業務スケジュール（観察・入力のタイミング）は各管理者の裁量に任せる。

- **自己評価の管理：** 月初に全職員の提出状況を確認し、未提出者に促す。
- **管理者評価の入力：** 月上限5名を対象にFormsへ入力する。
- **面談の実施と記録：** 面談および必要な指導を行い、評価月の翌月末までには必ず面談記録を残すこと。

## 8. 管理者間のすり合わせ

管理者間の評価軸を揃えるため、定例会議の場で接遇に関する共有を行う。

- 実名は出さない
- 事例ベースで共有する
- 目的は管理者間の認識ズレを防ぐことであり、個人批判ではない

## 9. 禁止事項

管理者は以下を行ってはならない。

- 職員同士を評価結果で比較する
- 評価内容を雑談や私的な場で共有する
- 評価を感情の発散や圧力として用いる
- 処遇・給与と結びつける発言を行う

## 10. 判断に迷った場合の基準

- マニュアルの基準に照らして適切か
- 自分が利用者だったらどう感じるか
- 注意しないことが、後に問題にならないか

## 11. 管理者へのメッセージ

本制度は、管理者自身が迷わず一貫した対応を行うための支えである。

感情ではなくルールで判断することで、現場の混乱を防ぎ、職員と利用者双方を守る。</script>
