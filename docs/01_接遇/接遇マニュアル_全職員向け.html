<script id="md-src" type="text/x-markdown"># 接遇マニュアル【全職員向け】

医療法人 いなだ医院（2026年2月1日改訂）

## 1. はじめに

私たちの仕事は、介護を通してご利用者様の生きがいや温もりのある生活を支えることです。接遇は「性格」の問題ではなく、介護技術と同様に必須の業務能力（スキル）です。適切な接遇は信頼関係を生み、結果として職員自身の業務をスムーズにします。

## 2. 接遇の定義と重要性

- **接遇 ＝ 接客 ＋ おもてなし**
  - 接客：最低限のマナーある対応（機械的）
  - 接遇：利用者を思いやり、心理に寄り添った表情や態度でサービスを提供すること
- **重要性：** 利用者の尊厳を守り、安心安全な介護へ繋がります。不適切な接遇はクレームや事故、さらには虐待に該当する恐れがあります。

## 3. 接遇の5原則（遵守事項）

1. **挨拶：** 自分から進んで行い、心と体を相手に向け、目線を合わせます。
2. **身だしなみ：** 清潔感のある制服、短い爪（ネイル禁止）、業務中の装飾品（結婚指輪除く）や強い香りは不可。
3. **表情・笑顔：** 穏やかで親しみやすい表情を基本とし、マスク越しでも目元で笑顔を伝えます。
4. **態度・立ち居振る舞い：** 腕組みや壁への寄りかかりは禁止。利用者の体を物のように扱う動作は厳禁です。
5. **言葉遣い：** 相手の年齢や認知機能に関わらず、敬語（です・ます調）を基本とします。

## 4. 従業員同士の接遇と報告ルール

良好なチームケアを提供するため、職員間でもプロとしての接遇を徹底します。

- **職場内での礼儀：** 職員同士でも挨拶を徹底し、感謝や労いの言葉を積極的に伝えます。
- **私事の禁止：** 利用者の前で、利用者を話題にした私語や、業務外の雑談・笑い声は慎んでください。
- **相互扶助：** 困っている職員がいれば声をかけ、チーム全体で業務を支えます。

### 接遇の指摘・指導に関する厳守事項

- **報告のルート：** 他の職員の不適切な接遇を見かけた場合、または利用者から指摘を受けた場合は、速やかに職位上の上司へ報告してください。
- **指導の実施：** 接遇に関する具体的な指摘や指導は、原則として職位上の上司（管理者等）から対象職員へ行います。
- **注意点：** 勤続年数が長いことや、年齢が上であることを理由に、独断で他の職員を指導・叱責することは控えてください。指導は必ず組織図に基づいた指揮系統を通じて行います。
- **緊急時：** 虐待の恐れなど緊急を要する場合はその場で制止し、事後直ちに上司へ報告してください。

## 5. 場面別・言葉遣いのルール

### 呼称の統一

「〇〇さん」を基本とし、「おばあちゃん」「お母さん」「〇〇ちゃん」などの呼称は禁止です。

### 言い換えの徹底

| 禁止表現 | 推奨表現 |
|----------|----------|
| 「ご飯だよ、食べるよ」 | 「お食事のご用意ができました」 |
| 「トイレ行くよ、ほら立って」 | 「お手洗いにご案内しましょうか」 |
| 「ちょっと待ってて」 | 「少々お待ちいただけますか」 |
| 「ダメ！」「座ってて！」 | 「危ないので、こちらにお掛けになってお待ちください」 |

## 6. クレーム・苦情への初期対応

1. **傾聴：** 最後まで話を聴き、途中で否定や反論をしない。
2. **心情への謝罪：** 「不快な思いをさせてしまい申し訳ございません」と伝える。
3. **即答回避と報告：** 独断で判断せず「確認して改めてご連絡します」と伝え、必ず管理者に報告します。

## 7. 迷ったときの判断基準

&gt; 「自分が利用者だったら、この対応をされて嫌ではないか？」  
&gt; 「自分の大切な家族が、この態度で接されたらどう感じるか？」  
&gt; 少しでも嫌だと感じるなら、その言動は不適切です。

## 8. 接遇マナーチェックリスト

- [ ] 自分から進んで明るく挨拶をしている
- [ ] 利用者様と話すとき、目線の高さを合わせている
- [ ] 忙しい時でも、ながら対応をせず穏やかに接している
- [ ] 職員同士で感謝と労いの言葉を伝え合っている
- [ ] 不適切な言動を見かけた際、独断で動かず上司に報告している

---

**相談窓口：** 接遇に関する疑問や、職場内での対応に悩む場合は、職位上の管理者または接遇担当まで連絡してください。</script>
