*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;min-height:100vh;overflow-x:hidden}
.bg-layer{position:fixed;inset:0;z-index:0;background:linear-gradient(145deg,#5bbfff 0%,#1a72c8 35%,#0d3a7a 65%,#061428 100%)}

.doc-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:11px;color:#94a3b8;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #e2e8f0}

.doc-body h2{font-size:17px;font-weight:800;color:#1a4b7a;margin:32px 0 12px;padding:8px 12px;background:#f0f7ff;border-left:4px solid #1a72c8;border-radius:0 6px 6px 0}
.doc-body h3{font-size:15px;font-weight:700;color:#1e40af;margin:22px 0 8px;padding-left:8px;border-left:2px solid #93c5fd}

.doc-body p{margin:0 0 14px;color:#334155}

.doc-body li{margin-bottom:6px;color:#334155}
.doc-body li::marker{color:#1a72c8;font-weight:700}
.doc-body table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px;overflow-x:auto;display:block}
.doc-body th{background:#1a72c8;color:#fff;padding:10px 14px;text-align:left;font-weight:700;font-size:13px;white-space:nowrap}
.doc-body td{padding:9px 14px;border-bottom:1px solid #e2e8f0;vertical-align:top;color:#334155}
.doc-body tr:nth-child(even) td{background:#f8fafc}
.doc-body tr:hover td{background:#eff6ff}
.doc-body strong{color:#0d3a7a;font-weight:800}
.doc-body em{color:#475569;font-style:italic}
.doc-body code{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:4px;padding:2px 6px;font-size:13px;font-family:monospace;color:#334155}
.doc-body pre{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:16px;overflow-x:auto;margin:0 0 16px}
.doc-body blockquote{border-left:4px solid #1a72c8;padding:10px 16px;background:#eff6ff;margin:0 0 14px;color:#475569;border-radius:0 8px 8px 0;font-style:italic}
.doc-body hr{border:none;border-top:2px solid #e2e8f0;margin:28px 0}
.doc-body a{color:#1a72c8;text-decoration:underline}
.doc-body a:hover{color:#0d3a7a}
.doc-body input[type=checkbox]{margin-right:6px;accent-color:#1a72c8;pointer-events:none}
</style>
</head>
<body>
