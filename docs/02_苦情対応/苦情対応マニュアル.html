<script id="md-src" type="text/x-markdown"># 苦情対応・カスタマーハラスメント防止マニュアル

## 1. 目的と基本方針

**目的：** サービス利用者やその家族からの苦情に対し、組織として適切かつ迅速に対応することで、サービスの質を向上させるとともに、不当な要求やハラスメントから全職員の心身の安全を守る。

**基本方針：**
- 正当な苦情には真摯に耳を傾け、改善に努める。
- 不当な要求、暴言、脅迫などのカスタマーハラスメントには、組織として毅然とした態度で臨み、一人で抱え込ませない。

## 2. カスタマーハラスメントの定義

当法人では、利用者や家族等による以下の行為をカスハラと定義します：

- **精神的な攻撃：** 暴言、罵声、屈辱的な発言、人格否定、差別的発言。
- **過剰な要求：** 契約範囲を超えたサービス（介護保険外の私的な用事など）の強要、医学的根拠のない治療・ケアの要求。
- **執拗な言動：** 長時間の拘束（電話・面談）、同じ内容の繰り返しの抗議。
- **物理的な攻撃・脅迫：** 暴力、物品の破壊、SNS等への誹謗中傷の投稿、金銭要求。

## 3. 苦情の分類と判断基準

| 分類 | 内容例 | 対応の方向性 |
|------|--------|-------------|
| 正当な苦情 | サービスへの不満、接遇の不備、施設の設備不良 | 謝罪、事実確認、改善案の提示 |
| 相談・不安 | 診療・ケア内容への不安、料金への疑問 | 丁寧な説明、専門職（看護師・ケアマネ等）への交代 |
| 不当な要求（カスハラ） | 暴言、長時間拘束、スタッフ個人の指名や攻撃 | 即時打ち切り、組織的対応、法的措置の検討 |

## 4. 現場での対応フロー

### ① 初期対応（全スタッフ共通）

- **傾聴と共感：** まずは相手の話を最後まで聴き、不快な思いをさせたことへの「限定的な謝罪」に留める（「ご不便をおかけし申し訳ございません」等）。
- **NG行動：** 安易な責任の全否定や、逆に非がないのに何でも認めすぎる謝罪、個人的な感情での言い返しは避ける。

### ② 5分・15分ルールの適用

- **5分ルール（一次対応）：** 一般スタッフの対応は5分を目安とし、解決しない場合や暴言が始まった場合は即座に上長へ報告・交代する。
- **15分ルール（管理者対応）：** 責任者による対応も15分を目安とし、進展がない場合は「本日はこれ以上お話しできません」と打ち切る。

### ③ 記録と報告

対応後は必ず「苦情・カスタマーハラスメント対応報告書」を記録し、管理者へ報告する。

## 5. カスハラへの毅然としたフレーズ集

| 場面 | 対応フレーズ |
|------|-------------|
| 暴言に対して | 「そのようなお言葉でお話しされるのでしたら、対応を終了させていただきます」 |
| 長時間拘束に対して | 「他のお客様への対応もございますので、本日はこれで失礼いたします」 |
| 不当要求に対して | 「法人の規定（および医療安全・介護保険制度）上、そのご要求にはお応えできかねます」 |

## 6. スタッフの保護とアフターケア

- **一人で対応させない：** カスハラが予想される面談等は必ず複数名で対応する。
- **メンタルケア：** 強いストレスを感じる対応の後は、5分間の休憩（クールダウン）を取り、上司がヒアリングを行う。
- **法的措置：** 身体的危害、業務妨害、執拗な嫌がらせに対しては、法人として警察への通報や顧問弁護士を通じた法的措置を講じる。

---

&gt; **重要な心得：** 医療・介護従事者は「奉仕の心」が求められますが、それは自己犠牲を意味しません。スタッフの尊厳を守ることは、安全なサービスを提供し続けるための法人としての責務です。</script>

const updated = '2026/5/6';
const meta = document.getElementById('doc-meta');
let m = '<span class="tag">📝 内部資料</span>';

marked.use({breaks: true, gfm: true});
const src = document.getElementById('md-src').textContent;
document.getElementById('doc-body').innerHTML = marked.parse(src);
document.querySelectorAll('.doc-body input[type=checkbox]').forEach(cb => { cb.disabled = true; });

// Warn blockquote detection (⚠ in first line)
document.querySelectorAll('.doc-body blockquote').forEach(bq => {
  if (bq.textContent.includes('⚠') || bq.textContent.includes('注意') || bq.textContent.includes('禁止')) {
    bq.classList.add('warn');
  }
});
