<script id="md-src" type="text/x-markdown"># 内部通報制度規程 ver.1.1

## 第1条（目的）

本制度は、法人内における法令違反行為、不正行為、ハラスメントその他不適切な行為を早期に発見し、是正することを目的とする。

## 第2条（通報対象行為）

本制度における通報対象は、次の各号に掲げる行為とする。

- 法令違反行為
- 職場における不正・不当な行為
- ハラスメント行為
- その他法人の秩序を害する行為

## 第3条（通報方法）

通報は原則として記名により行う。ただし、通報者の希望により匿名による通報も受け付ける。  
通報者の個人情報は、本人の同意なく開示しない。

## 第4条（通報受信者）

通報は以下の者にて受信・管理する。

- 稲田崇志（理事）
- 稲田智子（理事）
- 山下友利（第三者機関）

## 第5条（通報後の対応）

受信した通報については、受信者にて事実関係の確認を行い、必要に応じて懲戒処分を含む対応を検討する。  
通報者に対して、調査結果及び対応方針を説明した上で、組織全体への周知を行う。

## 第6条（通報者保護）

通報を理由とする通報者に対する不利益取扱いは禁止する。

## 第7条（虚偽通報の禁止）

故意による虚偽の通報は禁止する。  
虚偽通報が認められた場合には、懲戒処分の対象となることがある。

## 第8条（規程の改廃）

本規程の改廃は、法人経営陣により決定するものとする。

---

# 虚偽通報判断基準と調査フローマニュアル

## 1. 虚偽報告の判断基準

次のいずれかに該当する場合、虚偽と判断します：

- 客観的裏付けがなく、悪意が認められる場合
- 意図的な事実捏造・歪曲がある場合
- 虚偽と認められる証拠が提出された場合

&gt; ※ 善意の事実誤認は虚偽とみなしません。

## 2. 調査フロー

1. 通報受付
2. 初期審査
3. 関係者ヒアリング・証拠収集
4. 調査報告書作成
5. 判断決定
6. フィードバック</script>
