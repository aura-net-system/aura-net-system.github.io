<script id="md-src" type="text/x-markdown"># リファラル採用（職員紹介）制度 運用規定

2026/03/02 ver1.2（改訂版）

## 1. 制度の目的

現職員のネットワークを活用し、信頼性の高い人材を安定的に採用・定着させることを目的とする。

## 2. 対象職種（募集職種）

以下の職種を対象とする。

- 看護師
- 介護福祉士
- 実務者研修修了者、初任者研修修了者（以下、ヘルパー）
- 医療事務
- 調理師
- 対象職員：常勤職員およびパート職員

## 3. 紹介対象者の条件

以下のすべてを満たす必要がある。

1. 当法人に紹介会社等を経由せず直接応募し、入職した者
2. 常勤またはパート職員として採用された者
3. 採用後、3ヶ月以上または6ヶ月以上継続して勤務した者
4. 採用面接前に、紹介者が所定の「紹介申請書」を提出していること

&gt; **判断基準：** 勤務時間・日数については、入職時の雇用契約内容に基づき判断する。

---

## 4. 報奨金（インセンティブ）について

### 4-1. 常勤職員として採用された場合

| 職種 | 総額 | 3ヶ月継続勤務時 | 6ヶ月継続勤務時 |
|------|------|---------------|---------------|
| 看護師 | 60,000円 | 30,000円 | 30,000円 |
| 介護福祉士 | 50,000円 | 20,000円 | 30,000円 |
| ヘルパー・医療事務・調理師 | 30,000円 | 10,000円 | 20,000円 |

### 4-2. パート職員として採用された場合（三段階区分）

パート職員の支給額は、雇用契約上の「週所定労働時間」により以下の3区分とする。

#### 【区分A】週30時間以上（常勤の2/3相当）

| 職種 | 総額 | 3ヶ月継続勤務時 | 6ヶ月継続勤務時 |
|------|------|---------------|---------------|
| 看護師 | 40,000円 | 20,000円 | 20,000円 |
| 介護福祉士 | 33,000円 | 13,000円 | 20,000円 |
| ヘルパー・医療事務・調理師 | 20,000円 | 7,000円 | 13,000円 |

#### 【区分B】週20時間以上 30時間未満（常勤の1/2相当）

| 職種 | 総額 | 3ヶ月継続勤務時 | 6ヶ月継続勤務時 |
|------|------|---------------|---------------|
| 看護師 | 30,000円 | 15,000円 | 15,000円 |
| 介護福祉士 | 25,000円 | 10,000円 | 15,000円 |
| ヘルパー・医療事務・調理師 | 15,000円 | 5,000円 | 10,000円 |

#### 【区分C】週20時間未満（常勤の1/4相当）

| 職種 | 総額 | 3ヶ月継続勤務時 | 6ヶ月継続勤務時 |
|------|------|---------------|---------------|
| 看護師 | 15,000円 | 7,500円 | 7,500円 |
| 介護福祉士 | 12,500円 | 5,000円 | 7,500円 |
| ヘルパー・医療事務・調理師 | 7,500円 | 2,500円 | 5,000円 |

---

## 5. 報奨金の支給条件

### 5-1. 継続勤務期間と支給額

- 3ヶ月以上勤務した場合：規定の「3ヶ月分」を支給
- 6ヶ月以上勤務した場合：さらに規定の「6ヶ月分」を支給

### 5-2. 退職時の取り扱い

- 3ヶ月未満で退職した場合：報奨金の支給は行わない。
- 3ヶ月以上かつ6ヶ月未満で退職した場合：3ヶ月分のみ支給し、6ヶ月分は支給しない。

## 6. 留意事項・その他要件

- 同一人物に対する紹介が複数名からあった場合は、最も早く紹介申請書が受理された者を紹介者とみなす。
- 報奨金は給与課税（一時金）対象として処理する。
- 登録ヘルパー等、雇用契約を伴わない（または極めて不定期な）勤務形態は本制度の対象外とする。
- 紹介区分（A〜C）は原則として入職時の契約時間に基づき決定する。

## 7. 手続きの流れ

1. **申請：** 紹介者が候補者を見つけ、面接設定前に「紹介申請書」を提出。
2. **受付：** 人事部門または施設管理者が申請を受付・記録。
3. **判定：** 被紹介者の入職から3ヶ月・6ヶ月経過時の在籍状況を確認。
4. **支給：** 支給要件を満たした翌月、給与と併せて紹介者へ報奨金を支給。</script>
